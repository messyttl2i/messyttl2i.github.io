<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts: 標題用 Playfair Display, 內文用 Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <!-- Swiper CSS (圖片滑動套件) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --color-sleet: #D6DADC; /* Pantone 14-4005 - 背景主色 */
            --color-amethyst: #8A5FA2; /* Pantone 17-3628 - 文字與按鈕 */
            --white: #ffffff;
            --black: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-sleet);
            color: var(--color-amethyst);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* 導覽列 */
        nav {
            background: rgba(214, 218, 220, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-amethyst);
            margin-left: 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 品牌形象區 (Hero Section) */
        .hero {
            padding: 100px 5% 50px;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-style: italic;
            margin-bottom: 20px;
        }

        /* 商品列表 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px 5%;
        }

        .product-card {
            background: var(--white);
            padding: 15px;
            border-radius: 0; /* 極簡風通常用直角 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: transform 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        /* 圖片滾動區域 */
        .swiper {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 商品文字介紹 */
        .product-details {
            text-align: left;
            padding: 10px 0;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .product-price {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* 按鈕設計 */
        .btn-action {
            background: var(--color-amethyst);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 15px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-action:hover {
            letter-spacing: 4px;
            background: #734a8a;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        /* 會員彈窗 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            padding: 50px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #ddd;
            outline: none;
        }

        /* 即時反饋 Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-amethyst);
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 0.9rem;
            opacity: 0;
            transition: 0.5s;
            z-index: 3000;
        }

        /* RWD 適應 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">MessyTT&L2i</div>
    <div class="nav-links">
        <a href="#" onclick="showModal()">會員登入</a>
        <a href="#">購物車</a>
    </div>
</nav>

<section class="hero">
    <h1>Minimalist & Messy.</h1>
    <p>精選質感物件，為生活注入一絲慵懶的紫。</p>
</section>

<div class="product-grid">
    <!-- 商品 1 -->
    <div class="product-card">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <!-- 商品圖片輪播 -->
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=600" alt="Detail"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="product-details">
            <span class="product-name">Messy 手作質感單品</span>
            <div class="product-price">NT$ 1,680</div>
            <button class="btn-action" onclick="addToCart()">加入購物袋</button>
        </div>
    </div>

    <!-- 商品 2 (以此類推) -->
    <div class="product-card">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&q=80&w=600" alt="Product"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="product-details">
            <span class="product-name">L2i 限量聯名設計款</span>
            <div class="product-price">NT$ 2,200</div>
            <button class="btn-action" onclick="addToCart()">加入購物袋</button>
        </div>
    </div>
</div>

<!-- 會員彈窗 -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>JOIN US.</h2>
        <p>加入會員享專屬折扣與不定期優惠</p>
        <input type="email" id="emailInput" placeholder="Email Address">
        <button class="btn-action" onclick="submitJoin()">立即加入</button>
        <button style="background:none; border:none; margin-top:20px; color:#aaa; cursor:pointer;" onclick="hideModal()">關閉</button>
    </div>
</div>

<div id="toast">已成功加入購物袋</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // 初始化 Swiper 圖片輪播
    const swiper = new Swiper('.mySwiper', {
        loop: true,
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
    });

    // 會員彈窗功能
    function showModal() {
        document.getElementById('loginModal').style.display = 'flex';
    }

    function hideModal() {
        document.getElementById('loginModal').style.display = 'none';
    }

    function submitJoin() {
        const email = document.getElementById('emailInput').value;
        if(email) {
            hideModal();
            showToast("歡迎加入 MessyTT&L2i！優惠碼已寄出");
        }
    }

    // 加入購物車反應
    function addToCart() {
        showToast("已成功加入購物袋");
    }

    // 顯示即時反饋 (Toast)
    function showToast(text) {
        const toast = document.getElementById('toast');
        toast.innerText = text;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2500);
    }
</script>

</body>
</html>
