<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-sleet: #D6DADC; /* Pantone 14-4005 */
            --text-amethyst: #8A5FA2; /* Pantone 17-3628 */
            --white: #ffffff;
            --sidebar-width: 320px;
        }

        /* --- 基礎設定 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Sans TC', sans-serif; background: var(--white); color: var(--text-amethyst); overflow-x: hidden; }

        /* --- Header --- */
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 4%; background: var(--bg-sleet); height: 100px; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; gap: 20px; align-items: center; cursor: pointer; letter-spacing: 2px; font-size: 0.8rem; }
        .header-center img { height: 80px; cursor: pointer; }
        .header-right { display: flex; gap: 20px; justify-content: flex-end; font-size: 1.1rem; align-items: center; }
        
        .icon-btn { cursor: pointer; position: relative; transition: 0.3s; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--text-amethyst); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 50%; }

        /* --- 面板系統 (側邊欄、購物車) --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: none; z-index: 1100; backdrop-filter: blur(2px); }
        .panel { position: fixed; top: 0; height: 100%; background: rgba(240, 243, 247, 0.98); transition: 0.4s ease; z-index: 1101; padding: 40px 25px; display: flex; flex-direction: column; }
        .sidebar { left: -320px; width: var(--sidebar-width); }
        .cart-drawer { right: -350px; width: 350px; }
        .panel.active { left: 0; }
        .cart-drawer.active { right: 0; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-family: 'Playfair Display', serif; letter-spacing: 1px; font-size: 1.2rem; }

        /* --- 會員制度系統 (依截圖開發) --- */
        .member-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; z-index: 1200; display: none; width: 95%; max-width: 450px; height: 85vh; overflow-y: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .member-modal h3 { font-size: 1rem; margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--bg-sleet); padding-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; margin-bottom: 5px; opacity: 0.8; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: none; border-bottom: 1px solid var(--bg-sleet); outline: none; font-family: inherit; color: var(--text-amethyst); }
        .birthday-group { display: flex; gap: 10px; }
        
        /* --- 側邊欄目錄 (保留原有階層) --- */
        .nav-list { list-style: none; flex-grow: 1; }
        .nav-item { margin-bottom: 22px; }
        .nav-link { text-decoration: none; color: var(--text-amethyst); font-size: 0.85rem; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; letter-spacing: 1.5px; }
        .dropdown { padding-left: 15px; display: none; margin-top: 10px; }
        .dropdown.show { display: block; }
        .sub-item { display: block; padding: 6px 0; color: var(--text-amethyst); opacity: 0.7; text-decoration: none; font-size: 0.75rem; }

        /* --- 商品展示區 (4 欄) --- */
        .main-container { max-width: 1400px; margin: 50px auto; padding: 0 4%; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 45px 18px; }
        .image-box { width: 100%; aspect-ratio: 1/1; background: #f5f5f5; margin-bottom: 10px; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; scroll-behavior: smooth; cursor: pointer; }
        .image-box::-webkit-scrollbar { display: none; }
        .image-box img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }

        /* 購物車內部 */
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 12px; margin-bottom: 15px; border-bottom: 1px solid rgba(138, 95, 162, 0.1); padding-bottom: 10px; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; }

        /* 按鈕風格 (保持一致) */
        .btn { width: 100%; padding: 12px 0; font-size: 0.7rem; border: 1px solid var(--text-amethyst); cursor: pointer; background: none; color: var(--text-amethyst); text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: var(--text-amethyst); color: #fff; }
        .btn-full { background: var(--text-amethyst); color: #fff; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text-amethyst); color: white; padding: 12px 25px; font-size: 0.75rem; opacity: 0; transition: 0.5s; z-index: 3000; border-radius: 2px; pointer-events: none; }

        @media (max-width: 1000px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="header-left" onclick="togglePanel('sidebar')">
        <i class="fa-solid fa-bars-staggered icon-btn"></i> <span>SHOP</span>
    </div>
    <div class="header-center">
        <img src="images/S__80977927-.png" alt="Logo" onclick="location.href='index.html'">
    </div>
    <div class="header-right">
        <i class="fa-regular fa-user icon-btn" onclick="openMemberModal()"></i>
        <div class="icon-btn cart-icon-wrapper" onclick="togglePanel('cart-drawer')">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- 會員制度註冊彈窗 (依截圖製作) -->
<div class="member-modal" id="memberModal">
    <h3>請輸入你的個人資料，以完成註冊流程！</h3>
    
    <div class="form-group">
        <label>用戶名</label>
        <input type="text" id="reg_name" placeholder="您的姓名">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="reg_pw" placeholder="••••••••">
    </div>
    <div class="form-group">
        <label>性別</label>
        <select id="reg_gender">
            <option value="女">女</option>
            <option value="男">男</option>
            <option value="其他">其他</option>
        </select>
    </div>
    <div class="form-group">
        <label>生日日期</label>
        <div class="birthday-group">
            <input type="number" id="reg_yy" placeholder="年">
            <input type="number" id="reg_mm" placeholder="月">
            <input type="number" id="reg_dd" placeholder="日">
        </div>
    </div>
    <div class="form-group">
        <label>聯絡電話</label>
        <input type="tel" id="reg_phone" placeholder="09XX-XXX-XXX">
    </div>
    <div class="form-group">
        <label>地址</label>
        <input type="text" id="reg_address" placeholder="您的寄送地址">
    </div>
    <div class="form-group">
        <label>電子郵件 (發送回饋信用)</label>
        <input type="email" id="reg_email" placeholder="dream0122230@gmail.com">
    </div>
    
    <button class="btn btn-full" onclick="handleRegister()">立即加入！</button>
    <p style="text-align:center; font-size:0.6rem; margin-top:15px; cursor:pointer; text-decoration:underline;" onclick="closeAll()">返回首頁</p>
</div>

<!-- Sidebar (原有目錄) -->
<div class="panel sidebar" id="sidebar">
    <div class="panel-header"><div>MESSYTT&L2I</div><i class="fa-solid fa-xmark" onclick="closeAll()"></i></div>
    <ul class="nav-list">
        <li class="nav-item"><a href="#" class="nav-link" style="color: #b388eb; font-weight: 600;">HOME</a></li>
        <li class="nav-item"><a href="#" class="nav-link">26SS</a></li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('m-drop')">ALL MESSYTT <i class="fa-solid fa-chevron-down"></i></div>
            <div id="m-drop" class="dropdown">
                <a href="#" class="sub-item">CLOTHING</a>
                <a href="#" class="sub-item">ORIGINAL GOODS</a>
                <a href="#" class="sub-item">WEARABLE DEVICE</a>
            </div>
        </li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('l-drop')">ALL L2I <i class="fa-solid fa-chevron-down"></i></div>
            <div id="l-drop" class="dropdown">
                <a href="#" class="sub-item">NECKLACE</a>
                <a href="#" class="sub-item">RING</a>
            </div>
        </li>
        <li class="nav-item" style="margin-top: 30px;"><a href="#" class="nav-link" style="opacity:0.6;">CONTACT US</a></li>
    </ul>
   <!-- 側邊欄底部社群 -->
    <div class="sidebar-footer">
        <a href="https://instagram.com/6ttd_d" class="social-link" target="_blank">
            <i class="fa-brands fa-instagram"></i> @6ttd_d ・ MessyTT
        </a>
        <a href="https://instagram.com/6tto.o" class="social-link" target="_blank">
            <i class="fa-brands fa-instagram"></i> @6tto.o ・ L2i
        </a>
    </div>
</div>
<!-- 購物車 Drawer -->
<div class="panel cart-drawer" id="cart-drawer">
    <div class="panel-header"><div>YOUR BAG</div><i class="fa-solid fa-xmark" onclick="closeAll()"></i></div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-footer">
        <div class="cart-total"><span>TOTAL</span><span id="cartTotalPrice">NT$ 0</span></div>
        <button class="btn btn-full" onclick="showToast('前往綠界結帳系統...')">CHECKOUT</button>
    </div>
</div>

<!-- 商品主區域 (範例) -->
<div class="main-container">
    <div class="product-grid">
        <div class="product-card">
            <div class="image-box" onmouseenter="startAutoplay(this)" onmouseleave="stopAutoplay(this)">
                <img src="images/S__81002508_0.jpg"><img src="images/S__81002509_0.jpg">
            </div>
            <div class="product-info">
                <div class="product-name">Cyber Butterfly Necklace</div>
                <div class="product-price">NT$ 2,580</div>
                <select class="size-select" id="size-1"><option>One Size</option></select>
                <button class="btn" onclick="addToCart('1', 'Butterfly Necklace', 2580, 'images/S__81002508_0.jpg', 'size-1')">Add to Bag</button>
            </div>
        </div>
        <!-- 其他商品比照辦理 -->
    </div>
</div>

<div id="toast">已成功操作</div>

<!-- 串接 EmailJS (免費發送 Gmail) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // 初始化購物車
    let cart = JSON.parse(localStorage.getItem('messy_cart')) || [];
    window.onload = () => updateCartUI();

    // 介面控制
    function togglePanel(id) {
        closeAll();
        document.getElementById(id).classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }
    function openMemberModal() {
        closeAll();
        document.getElementById('memberModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    function closeAll() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('memberModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
    function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }

    // 會員註冊與發信邏輯
    function handleRegister() {
        const name = document.getElementById('reg_name').value;
        const email = document.getElementById('reg_email').value;
        
        if(!name || !email) return alert("請填寫姓名與電子郵件！");

        showToast("註冊成功！系統正發送見面禮至您的信箱...");

        // 這裡模擬發送信件 (實際運行需註冊 EmailJS 取得 ServiceID/TemplateID)
        /*
        emailjs.send("service_id", "template_id", {
            to_name: name,
            to_email: email,
            message: "恭喜您成為 MESSYTT&L2I 的新會員！獲得 30 入會購物金。"
        }, "user_public_key");
        */

        setTimeout(() => {
            closeAll();
            showToast(`歡迎加入, ${name}！請檢查信箱領取優惠。`);
        }, 2000);
    }

    // 購物車系統
    function addToCart(id, name, price, img, sizeId) {
        const size = document.getElementById(sizeId).value;
        const existing = cart.find(item => item.id === id && item.size === size);
        if (existing) { existing.qty += 1; } 
        else { cart.push({ id, name, price, img, size, qty: 1 }); }
        localStorage.setItem('messy_cart', JSON.stringify(cart));
        updateCartUI();
        togglePanel('cart-drawer');
    }

    function updateCartUI() {
        const list = document.getElementById('cartItemsList');
        const count = document.getElementById('cartCount');
        const total = document.getElementById('cartTotalPrice');
        let totalPrice = 0; let totalCount = 0;
        list.innerHTML = '';
        cart.forEach((item, index) => {
            totalPrice += item.price * item.qty;
            totalCount += item.qty;
            list.innerHTML += `<div class="cart-item"><img src="${item.img}"><div class="cart-item-info"><b>${item.name}</b><br>Size: ${item.size}<br>Qty: ${item.qty}<br>NT$ ${item.price}</div></div>`;
        });
        count.innerText = totalCount;
        total.innerText = `NT$ ${totalPrice.toLocaleString()}`;
    }

    // 圖片自動輪播 (Hover)
    let autoplay;
    function startAutoplay(el) {
        autoplay = setInterval(() => {
            el.scrollLeft += el.offsetWidth;
            if(el.scrollLeft + el.offsetWidth >= el.scrollWidth) el.scrollLeft = 0;
        }, 1200);
    }
    function stopAutoplay(el) { clearInterval(autoplay); el.scrollLeft = 0; }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }
</script>

</body>
</html>
