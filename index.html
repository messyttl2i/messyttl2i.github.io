<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="product-detail">
        <h1>Product Name</h1>
        <div class="product-gallery">
            <img src="image1.jpg" alt="Product Image 1">
            <img src="image2.jpg" alt="Product Image 2">
            <img src="image3.jpg" alt="Product Image 3">
            <img src="image4.jpg" alt="Product Image 4">
        </div>
        <div class="size-selection">
            <label for="size">Choose a size:</label>
            <select id="size">
                <option value="S">Small</option>
                <option value="M">Medium</option>
            </select>
        </div>
        <div class="action-buttons">
            <button id="add-to-cart">Add to Cart</button>
            <button id="buy-now">Buy Now</button>
        </div>
    </div>
    <script>
        document.getElementById('add-to-cart').onclick = function() {
            const size = document.getElementById('size').value;
            // Add to cart functionality goes here
            alert('Added to cart with size: ' + size);
        };
        document.getElementById('buy-now').onclick = function() {
            const size = document.getElementById('size').value;
            // Redirect to shopping cart functionality goes here
            alert('Redirecting to cart with size: ' + size);
            window.location.href = 'shopping_cart.html';
        };
    </script>
</body>
</html>
