<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts: 標題用 Playfair Display, 內文用 Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-sleet: #D6DADC; /* Pantone 14-4005 */
            --text-amethyst: #8A5FA2; /* Pantone 17-3628 */
            --white-trans: rgba(255, 255, 255, 0.85);
            --sidebar-width: 320px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-sleet);
            color: var(--text-amethyst);
            overflow-x: hidden;
        }

        /* --- Header 頂部欄 --- */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 5%;
            background: rgba(235, 238, 241, 0.7);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .menu-icon { font-size: 24px; cursor: pointer; justify-self: start; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 3px; font-weight: 500; }
        .header-icons { justify-self: end; font-size: 20px; }
        .header-icons i { margin-left: 20px; cursor: pointer; }

        /* --- Sidebar 側邊選單 --- */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            display: none; z-index: 1000;
        }

        .sidebar {
            position: fixed;
            top: 0; left: -320px; width: var(--sidebar-width); height: 100%;
            background: rgba(240, 243, 247, 0.98);
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            transition: 0.4s ease;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
        }

        .sidebar.active { left: 0; }

        .close-btn { align-self: flex-end; font-size: 24px; cursor: pointer; margin-bottom: 40px; opacity: 0.6; }

        /* 選單項目 */
        .nav-list { list-style: none; flex-grow: 1; }
        .nav-item { margin-bottom: 25px; }
        .nav-link {
            text-decoration: none;
            color: var(--text-amethyst);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 400;
        }
        .nav-link.active-link { font-weight: 600; color: #b388eb; } /* HOME 的紫色漸變感 */

        /* 下拉選單 */
        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: 0.3s ease;
            padding-left: 15px;
        }
        .dropdown-content.show { max-height: 200px; margin-top: 15px; }
        .sub-item {
            padding: 8px 0;
            font-size: 0.9rem;
            opacity: 0.7;
            text-decoration: none;
            color: var(--text-amethyst);
            display: block;
        }

        /* 側邊欄底部社群 */
        .sidebar-footer {
            border-top: 1px solid rgba(138, 95, 162, 0.1);
            padding-top: 30px;
        }
        .social-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-amethyst);
            font-size: 0.85rem;
            margin-bottom: 15px;
            opacity: 0.8;
        }
        .social-link i { margin-right: 12px; font-size: 18px; }

        /* --- 商品展示區 --- */
        .product-section { padding: 40px 5%; }
        .product-card { background: white; padding: 15px; margin-bottom: 40px; }
        .swiper { width: 100%; height: 450px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* 會員 Toast */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--text-amethyst); color: white;
            padding: 12px 30px; border-radius: 40px; font-size: 0.9rem;
            opacity: 0; transition: 0.5s; z-index: 2000;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="menu-icon" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></div>
    <div class="logo">MESSYTT&L2I</div>
    <div class="header-icons">
        <i class="fa-solid fa-bag-shopping"></i>
        <i class="fa-regular fa-user" onclick="showMemberPopup()"></i>
    </div>
</header>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="close-btn" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></div>
    
    <ul class="nav-list">
        <li class="nav-item">
            <a href="#" class="nav-link active-link">HOME</a>
        </li>
        <li class="nav-item">
            <a href="#" class="nav-link">26SS</a>
        </li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('messy-drop')">
                ALL MESSYTT <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
            </div>
            <div class="dropdown-content" id="messy-drop">
                <a href="#" class="sub-item">Clothing</a>
                <a href="#" class="sub-item">Original Goods</a>
                <a href="#" class="sub-item">Wearable Device</a>
            </div>
        </li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('l2i-drop')">
                ALL L2I <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
            </div>
            <div class="dropdown-content" id="l2i-drop">
                <a href="#" class="sub-item">Necklace</a>
                <a href="#" class="sub-item">Ring</a>
            </div>
        </li>
        <li class="nav-item" style="margin-top: 40px;">
            <a href="#" class="nav-link" style="opacity: 0.6;">CONTACT US</a>
        </li>
    </ul>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
        <a href="https://instagram.com/6ttd_d" class="social-link">
            <i class="fa-brands fa-instagram"></i> @6ttd_d ・ MessyTT
        </a>
        <a href="https://instagram.com/6tto.o" class="social-link">
            <i class="fa-brands fa-instagram"></i> @6tto.o ・ L2i
        </a>
    </div>
</div>

<!-- Main Content -->
<div class="product-section">
    <div class="product-card">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=600" alt="P1"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1539109132381-31a15b22b8ae?q=80&w=600" alt="P2"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <div style="padding-top: 20px; text-align: center;">
            <p style="letter-spacing: 1px;">經典編織款</p>
            <p style="font-size: 0.9rem; opacity: 0.7; margin: 10px 0;">NT$ 1,280</p>
            <button onclick="showToast('商品已加入購物車')" style="background:var(--text-amethyst); color:white; border:none; padding:10px 40px; cursor:pointer; width:100%;">ADD TO BAG</button>
        </div>
    </div>
</div>

<div id="toast">已成功送出</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // 初始化輪播
    const swiper = new Swiper('.mySwiper', {
        loop: true,
        pagination: { el: '.swiper-pagination', clickable: true },
    });

    // 側邊欄開關
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
    }

    // 下拉選單開關
    function toggleDropdown(id) {
        const drop = document.getElementById(id);
        drop.classList.toggle('show');
        // 旋轉箭頭小動畫 (選配)
        const icon = event.currentTarget.querySelector('.fa-chevron-down');
        icon.style.transform = drop.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        icon.style.transition = '0.3s';
    }

    // 提示訊息
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }
    
    function showMemberPopup() {
        showToast("會員功能即將上線");
    }
</script>

</body>
</html>
