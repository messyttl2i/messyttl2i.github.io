<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-sleet: #D6DADC; /* Pantone 14-4005 */
            --text-amethyst: #8A5FA2; /* Pantone 17-3628 */
            --white: #ffffff;
            --sidebar-width: 320px;
        }

        /* --- 基礎設定 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Sans TC', sans-serif; background: var(--white); color: var(--text-amethyst); overflow-x: hidden; }

        /* --- Header --- */
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 4%; background: var(--bg-sleet); height: 100px; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; gap: 20px; align-items: center; cursor: pointer; letter-spacing: 2px; font-size: 0.8rem; }
        .header-center img { height: 80px; cursor: pointer; transition: 0.3s; }
        .header-right { display: flex; gap: 20px; justify-content: flex-end; font-size: 1.1rem; align-items: center; }
        
        .icon-btn { cursor: pointer; position: relative; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--text-amethyst); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 50%; }
        /* 登入狀態小綠點 */
        .login-status-dot { position: absolute; bottom: -2px; right: -2px; width: 9px; height: 9px; background: #4CAF50; border-radius: 50%; border: 1.5px solid white; display: none; }

        /* --- 面板系統 --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); display: none; z-index: 1100; backdrop-filter: blur(2px); }
        .panel { position: fixed; top: 0; height: 100%; background: rgba(240, 243, 247, 0.98); transition: 0.4s ease; z-index: 1101; padding: 40px 25px; display: flex; flex-direction: column; }
        .sidebar { left: -320px; width: var(--sidebar-width); }
        .cart-drawer { right: -350px; width: 350px; }
        .panel.active { left: 0; }
        .cart-drawer.active { right: 0; }

        /* --- 會員制度系統 --- */
        .member-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; z-index: 1200; display: none; width: 95%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        
        /* 註冊表單文字標籤 (依照截圖) */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.6; color: var(--text-amethyst); }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: none; border-bottom: 1px solid var(--bg-sleet); outline: none; background: #f4f7fa; color: var(--text-amethyst); font-family: inherit; }

        /* 已登入狀態頁面 (Membership Center) */
        #loggedInView { display: none; text-align: center; }
        .member-profile-header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .member-profile-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 5px; }
        .member-tag { display: inline-block; background: #000; color: #fff; font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; }
        
        .member-menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; cursor: pointer; text-decoration: none; color: var(--text-amethyst); font-size: 0.9rem; }
        .member-menu-item:hover { opacity: 0.7; }

        /* --- 側邊欄目錄 (嚴格保留) --- */
        .nav-list { list-style: none; flex-grow: 1; }
        .nav-item { margin-bottom: 22px; }
        .nav-link { text-decoration: none; color: var(--text-amethyst); font-size: 0.85rem; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; letter-spacing: 1.5px; }
        .dropdown { padding-left: 15px; display: none; margin-top: 10px; }
        .dropdown.show { display: block; }
        .sub-item { display: block; padding: 6px 0; color: var(--text-amethyst); opacity: 0.7; text-decoration: none; font-size: 0.75rem; }

        /* --- 商品展示區 --- */
        .main-container { max-width: 1400px; margin: 50px auto; padding: 0 4%; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 45px 18px; }
        .image-box { width: 100%; aspect-ratio: 1/1; background: #f5f5f5; margin-bottom: 10px; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; scroll-behavior: smooth; cursor: pointer; }
        .image-box::-webkit-scrollbar { display: none; }
        .image-box img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }

        /* 按鈕風格 */
        .btn { width: 100%; padding: 12px 0; font-size: 0.7rem; border: 1px solid var(--text-amethyst); cursor: pointer; background: none; color: var(--text-amethyst); text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: var(--text-amethyst); color: #fff; }
        .btn-full { background: var(--text-amethyst); color: #fff; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text-amethyst); color: white; padding: 10px 25px; font-size: 0.75rem; opacity: 0; transition: 0.5s; z-index: 3000; border-radius: 2px; pointer-events: none; }

        @media (max-width: 1000px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="header-left" onclick="togglePanel('sidebar')">
        <i class="fa-solid fa-bars-staggered icon-btn"></i> <span>SHOP</span>
    </div>
    <div class="header-center">
        <img src="images/S__80977927-.png" alt="Logo" onclick="location.href='index.html'">
    </div>
    <div class="header-right">
        <div class="icon-btn" onclick="openMemberModal()">
            <i class="fa-regular fa-user"></i>
            <div id="loginDot" class="login-status-dot"></div>
        </div>
        <div class="icon-btn" onclick="togglePanel('cart-drawer')">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- 會員彈窗系統 -->
<div class="member-modal" id="memberModal">
    <!-- 視圖 1: 註冊表單 (依照您的截圖優化) -->
    <div id="formView">
        <h3 style="text-align:center; margin-bottom:25px; letter-spacing:1px;">REGISTER:建立你的個人資料！</h3>
        
        <div class="form-group"><label>用戶名(Account)</label><input type="text" id="reg_name" placeholder=""></div>
        <div class="form-group"><label>密碼(Password)</label><input type="password" id="reg_pw" placeholder=""></div>
        <div class="form-group"><label>性別(Gentle)</label><select id="reg_gender"><option>女</option><option>男</option></select></div>
        <div class="form-group">
            <label>生日日期(Birth)</label>
            <div style="display:flex; gap:10px;"><input type="number" id="reg_yy" placeholder="年"><input type="number" id="reg_mm" placeholder="月"><input type="number" id="reg_dd" placeholder="日"></div>
        </div>
        <div class="form-group"><label>聯絡電話(Tel)</label><input type="tel" id="reg_phone" placeholder=""></div>
        <div class="form-group"><label>地址(Adress)</label><input type="text" id="reg_address" placeholder=""></div>
        <div class="form-group"><label>電子郵件(Email)</label><input type="email" id="reg_email" placeholder=""></div>
        
        <button class="btn btn-full" id="submitBtn" onclick="handleRegister()">立即加入！</button>
    </div>

    <!-- 視圖 2: 已登入狀態 (依照您的截圖優化) -->
    <div id="loggedInView">
        <div class="member-profile-header">
            <div class="member-tag">MEMBER</div>
            <h2 id="displayUserName">user_name</h2>
            <p style="font-size: 0.7rem; opacity: 0.5;">{{user_email}}</p>
        </div>
        
        <div class="member-menu">
            <div class="member-menu-item" onclick="showToast('會員資料載入中...')">
                <span>會員資料 Membership</span>
                <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </div>
            <div class="member-menu-item" style="margin-top: 20px; border-top: 1px solid #f0f0f0;" onclick="handleLogout()">
                <span style="color: #aaa;">登出 Log out</span>
            </div>
        </div>
        
        <button class="btn btn-full" style="margin-top: 30px;" onclick="closeAll()">返回首頁 BACK</button>
    </div>
</div>

<!-- Sidebar 側邊欄 (嚴格保留原有層級) -->
<div class="panel sidebar" id="sidebar">
    <div class="panel-header"><div>MESSYTT&L2I</div><i class="fa-solid fa-xmark" style="cursor:pointer" onclick="closeAll()"></i></div>
    <ul class="nav-list">
        <li class="nav-item"><a href="#" class="nav-link" style="color: #b388eb; font-weight: 600;">HOME</a></li>
        <li class="nav-item"><a href="#" class="nav-link">26SS</a></li>
        <li class="nav-item">
            <div class="nav-link" onclick="document.getElementById('m-drop').classList.toggle('show')">ALL MESSYTT <i class="fa-solid fa-chevron-down"></i></div>
            <div id="m-drop" class="dropdown"><a href="#" class="sub-item">CLOTHING</a><a href="#" class="sub-item">ORIGINAL GOODS</a><a href="#" class="sub-item">Wearable device</a></div>
        </li>
      <!-- 側邊欄底部社群 -->
    <div class="sidebar-footer">
        <a href="https://instagram.com/6ttd_d" class="social-link" target="_blank">
            <i class="fa-brands fa-instagram"></i> @6ttd_d ・ MessyTT
        </a>
        <a href="https://instagram.com/6tto.o" class="social-link" target="_blank">
            <i class="fa-brands fa-instagram"></i> @6tto.o ・ L2i
        </a>
    </div>
</div>

<!-- 購物車 -->
<div class="panel cart-drawer" id="cart-drawer">
    <div class="panel-header"><div>YOUR BAG</div><i class="fa-solid fa-xmark" style="cursor:pointer" onclick="closeAll()"></i></div>
    <div class="cart-items" id="cartItemsList"></div>
    <div class="cart-footer">
        <div class="cart-total"><span>TOTAL</span><span id="cartTotalPrice">NT$ 0</span></div>
        <button class="btn btn-full" onclick="showToast('前往綠界付款...')">CHECKOUT</button>
    </div>
</div>

<!-- 商品主區域 -->
<div class="main-container">
    <div class="product-grid">
        <div class="product-card">
            <div class="image-box" onmouseenter="startAutoplay(this)" onmouseleave="stopAutoplay(this)">
                <img src="images/S__81002508_0.jpg"><img src="images/S__81002509_0.jpg">
            </div>
            <div class="product-info">
                <div class="product-name">Cyber Butterfly Necklace</div>
                <div class="product-price">NT$ 2,580</div>
                <button class="btn btn-full" onclick="addToCart('1', 'Butterfly Necklace', 2580, 'images/S__81002508_0.jpg')">Add to Bag</button>
            </div>
        </div>
    </div>
</div>

<div id="toast">已成功操作</div>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    // --- 重要：請填入您的 PUBLIC KEY ---
    (function(){ emailjs.init({ publicKey: "m1fvagOxoo5vaDvX1" }); })();

    let cart = JSON.parse(localStorage.getItem('messy_cart')) || [];
    let currentUser = JSON.parse(localStorage.getItem('messy_user')) || null;

    window.onload = () => {
        updateCartUI();
        updateMemberUI();
    };

    function togglePanel(id) { closeAll(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display='block'; }
    function closeAll() { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('memberModal').style.display='none'; document.getElementById('overlay').style.display='none'; }

    // --- 會員中心邏輯 ---
    function openMemberModal() {
        document.getElementById('memberModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        updateMemberUI();
    }

    function updateMemberUI() {
        const formView = document.getElementById('formView');
        const loggedInView = document.getElementById('loggedInView');
        const dot = document.getElementById('loginDot');

        if (currentUser) {
            formView.style.display = 'none';
            loggedInView.style.display = 'block';
            dot.style.display = 'block';
            document.getElementById('displayUserName').innerText = currentUser.name;
        } else {
            formView.style.display = 'block';
            loggedInView.style.display = 'none';
            dot.style.display = 'none';
        }
    }

    function handleRegister() {
        const password = document.getElementById('reg_password').value;
        const email = document.getElementById('reg_email').value;
        if(!password || !email) return alert("密碼與 Email 是必須填寫的！");

        document.getElementById('submitBtn').innerText = "正在傳送見面禮...";
        
        emailjs.send("service_pzf7lvt", "template_lsph3zp", { user_name: name, user_email: email })
        .then(() => {
            saveUserAndLogin(password, email);
        })
        .catch(() => {
            saveUserAndLogin(password, email); // 測試用
        });
    }

    function saveUserAndLogin(name, email) {
        currentUser = { name: name, email: email };
        localStorage.setItem('messy_user', JSON.stringify(currentUser));
        showToast("註冊成功！歡迎加入");
        updateMemberUI();
    }

    function handleLogout() {
        localStorage.removeItem('messy_user');
        currentUser = null;
        updateMemberUI();
        showToast("已成功登出");
    }

    // --- 購物車與輪播 ---
    function addToCart(id, name, price, img) {
        const existing = cart.find(item => item.id === id);
        if (existing) { existing.qty += 1; } else { cart.push({ id, name, price, img, qty: 1 }); }
        localStorage.setItem('messy_cart', JSON.stringify(cart));
        updateCartUI(); togglePanel('cart-drawer');
    }
    function updateCartUI() {
        const list = document.getElementById('cartItemsList');
        const count = document.getElementById('cartCount');
        const total = document.getElementById('cartTotalPrice');
        let totalPrice = 0; let totalCount = 0; list.innerHTML = '';
        cart.forEach((item, index) => {
            totalPrice += item.price * item.qty; totalCount += item.qty;
            list.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:15px;"><img src="${item.img}" width="50"><div><b>${item.name}</b><br>Qty: ${item.qty}<br>NT$ ${item.price}</div></div>`;
        });
        count.innerText = totalCount; total.innerText = `NT$ ${totalPrice.toLocaleString()}`;
    }
    let autoplay;
    function startAutoplay(el) { autoplay = setInterval(() => { el.scrollLeft += el.offsetWidth; if(el.scrollLeft + el.offsetWidth >= el.scrollWidth) el.scrollLeft = 0; }, 1200); }
    function stopAutoplay(el) { clearInterval(autoplay); el.scrollLeft = 0; }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1'; setTimeout(() => { t.style.opacity = '0'; }, 2500); }
</script>

</body>
</html>
