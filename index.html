<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-sleet: #D6DADC; /* Pantone 14-4005 */
            --text-amethyst: #8A5FA2; /* Pantone 17-3628 */
            --white: #ffffff;
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-sleet);
            color: var(--text-amethyst);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
            background: rgba(214, 218, 220, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 100px;
        }

        .header-left { display: flex; gap: 30px; flex: 1; align-items: center; }
        .header-left div { font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }

        .header-center { flex: 1; display: flex; justify-content: center; }
        .header-center img { height: 75px; cursor: pointer; }

        .header-right { display: flex; gap: 20px; flex: 1; justify-content: flex-end; align-items: center; }
        .header-right i { font-size: 1.1rem; cursor: pointer; }

        /* --- Sidebar --- */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1100; }
        .sidebar { position: fixed; top: 0; left: -300px; width: var(--sidebar-width); height: 100%; background: #f4f6f8; transition: 0.4s ease; z-index: 1101; padding: 40px 30px; }
        .sidebar.active { left: 0; }
        .nav-list { list-style: none; margin-top: 40px; }
        .nav-item { margin-bottom: 25px; }
        .nav-link { text-decoration: none; color: var(--text-amethyst); text-transform: uppercase; font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; }
        .dropdown-content { max-height: 0; overflow: hidden; transition: 0.3s; padding-left: 10px; }
        .dropdown-content.show { max-height: 200px; margin-top: 10px; }
        .sub-item { display: block; padding: 6px 0; color: var(--text-amethyst); opacity: 0.7; text-decoration: none; font-size: 0.75rem; }

        /* --- 商品區域 (重點修正：強制給予高度) --- */
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 4%; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }

        .product-item { background: transparent; width: 100%; }

        /* 強制設定 Swiper 高度，防止圖片消失 */
        .swiper { 
            width: 100%; 
            height: 450px; /* 電腦版高度 */
            background: #e0e4e7; 
            margin-bottom: 20px; 
            overflow: hidden;
        }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .swiper-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .product-info { text-align: left; }
        .product-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 8px; }
        .product-desc { font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px; line-height: 1.5; min-height: 3em; }
        .product-price { font-size: 0.9rem; margin-bottom: 20px; font-weight: 500; }

        .button-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px 0; font-size: 0.75rem; cursor: pointer; border-radius: 0; text-transform: uppercase; border: none; }
        .btn-add { background: none; border: 1px solid var(--text-amethyst); color: var(--text-amethyst); }
        .btn-buy { background: var(--text-amethyst); color: var(--white); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text-amethyst); color: white; padding: 12px 25px; font-size: 0.8rem; opacity: 0; transition: 0.5s; z-index: 2000; pointer-events: none; }

        /* 手機版適應 */
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            .swiper { height: 380px; } /* 手機版高度縮小 */
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i> SHOP</div>
        <div onclick="showToast('更多資訊即將上線')">INFO</div>
    </div>
    <div class="header-center">
        <!-- Logo 路徑 -->
        <img src="images/S__80977927-.png" alt="Logo" onclick="location.href='index.html'">
    </div>
    <div class="header-right">
        <i class="fa-solid fa-bag-shopping" onclick="showToast('購物袋為空')"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="text-align: right; cursor: pointer;" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></div>
    <ul class="nav-list">
        <li class="nav-item"><a href="#" class="nav-link" style="font-weight: 600;">HOME</a></li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('m-drop')">ALL MESSYTT <i class="fa-solid fa-chevron-down"></i></div>
            <div id="m-drop" class="dropdown-content">
                <a href="#" class="sub-item">Clothing</a>
                <a href="#" class="sub-item">Original Goods</a>
            </div>
        </li>
        <li class="nav-item">
            <div class="nav-link" onclick="toggleDropdown('l-drop')">ALL L2I <i class="fa-solid fa-chevron-down"></i></div>
            <div id="l-drop" class="dropdown-content">
                <a href="#" class="sub-item">Necklace</a>
                <a href="#" class="sub-item">Ring</a>
            </div>
        </li>
    </ul>
</div>

<div class="main-container">
    <div class="product-grid">
        
        <!-- 商品 1 -->
        <div class="product-item">
            <div class="swiper productSwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="images/S__81002508_0.jpg"></div>
                    <div class="swiper-slide"><img src="images/S__81002509_0.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="product-info">
                <div class="product-name">MESSYTT : Cyber Object</div>
                <div class="product-desc">手工訂製 Y2K 未來感項鍊，展現獨特的流動金屬美學。</div>
                <div class="product-price">NT$ 2,580</div>
                <div class="button-group">
                    <button class="btn btn-add" onclick="showToast('已加入購物車')">Add</button>
                    <button class="btn btn-buy" onclick="handleBuy('綠界連結')">Buy</button>
                </div>
            </div>
        </div>

        <!-- 商品 2 (以此類推) -->
        <div class="product-item">
            <div class="swiper productSwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="images/S__81002510_0.jpg"></div>
                    <div class="swiper-slide"><img src="images/S__81002511_0.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="product-info">
                <div class="product-name">L2i : Mesh Baby-T</div>
                <div class="product-desc">修身剪裁網紗上衣，慵懶與層次感的完美結合。</div>
                <div class="product-price">NT$ 1,280</div>
                <div class="button-group">
                    <button class="btn btn-add" onclick="showToast('已加入購物車')">Add</button>
                    <button class="btn btn-buy" onclick="handleBuy('綠界連結')">Buy</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toast">操作成功</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // 確保所有的 Swiper 都能被正確初始化 (關鍵修正)
    window.onload = function() {
        const swiperElements = document.querySelectorAll('.productSwiper');
        swiperElements.forEach((el) => {
            new Swiper(el, {
                loop: true,
                pagination: { el: el.querySelector('.swiper-pagination'), clickable: true },
            });
        });
    };

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.toggle('active');
        ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
    }

    function toggleDropdown(id) {
        document.getElementById(id).classList.toggle('show');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function handleBuy(url) {
        showToast("前往結帳頁面...");
    }
</script>

</body>
</html>
