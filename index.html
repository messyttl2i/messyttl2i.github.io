        window.onload = function() {
            // Ensure openEMapBtn click binds exactly once
            document.getElementById('openEMapBtn').onclick = function() {
                openEMapSelector();
            };
        };

        function openEMapSelector() {
            // Open the eMap popup synchronously
            const payload = {}; // Populate with necessary data
            postToFunctionWithFallback('ecpay-logistics-map', payload).then(resp => {
                const eMapUrl = resp.data?.data ? resp.data.data.eMapUrl : resp.data.eMapUrl;
                const formData = resp.data?.data ? resp.data.data.formData : resp.data.formData;
                // Submitting the form to the popupName
                const form = document.createElement('form');
                form.action = eMapUrl;
                form.method = 'POST';
                for (const key in formData) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = formData[key];
                    form.appendChild(input);
                }
                document.body.appendChild(form);
                form.submit();
                // Debugging information
                window.__emapResult = resp;
            });
        }
    </script>

<body>
    <button id="openEMapBtn">Open E-map</button>
</body>
