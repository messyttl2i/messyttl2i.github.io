<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official Store</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Swiper CSS (滾動圖片套件) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-sleet: #D6DADC; /* Pantone 14-4005 */
            --text-amethyst: #8A5FA2; /* Pantone 17-3628 */
            --white: #ffffff;
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-sleet);
            color: var(--text-amethyst);
            overflow-x: hidden;
        }

        /* --- Header 頂部 --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
            background: rgba(214, 218, 220, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 100px;
        }

        .header-left { display: flex; gap: 30px; flex: 1; align-items: center; }
        .header-left div, .header-left a {
            text-decoration: none;
            color: var(--text-amethyst);
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .header-center { flex: 1; display: flex; justify-content: center; }
        .header-center img { 
            height: 85px; /* 根據 Logo 比例可調整高度 */
            cursor: pointer; 
            transition: 0.3s;
        }
        .header-center img:hover { transform: scale(1.05); }

        .header-right { display: flex; gap: 20px; flex: 1; justify-content: flex-end; align-items: center; }
        .header-right a { text-decoration: none; color: var(--text-amethyst); font-size: 0.8rem; letter-spacing: 1px; }
        .header-right i { font-size: 1.1rem; cursor: pointer; }

        /* --- Sidebar 側邊選單 --- */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); display: none; z-index: 1100; }
        .sidebar { position: fixed; top: 0; left: -300px; width: var(--sidebar-width); height: 100%; background: #f4f6f8; transition: 0.4s ease; z-index: 1101; padding: 40px 30px; border-right: 1px solid rgba(138, 95, 162, 0.1); }
        .sidebar.active { left: 0; }
        .nav-list { list-style: none; margin-top: 40px; }
        .nav-item { margin-bottom: 25px; }
        .nav-link { text-decoration: none; color: var(--text-amethyst); text-transform: uppercase; font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-content { max-height: 0; overflow: hidden; transition: 0.3s; padding-left: 10px; }
        .dropdown-content.show { max-height: 200px; margin-top: 10px; }
        .sub-item { display: block; padding: 6px 0; color: var(--text-amethyst); opacity: 0.7; text-decoration: none; font-size: 0.75rem; }

        /* --- 商品展示區 (直向兩排) --- */
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 4%; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
