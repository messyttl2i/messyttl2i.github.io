<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MessyTT&L2i</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans TC', sans-serif;
  background: #A7C7E7;
  color: #8A5FA2;
}

/* header */
header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* 商品區 */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.05);
}

.product img {
  width: 100%;
  border-radius: 8px;
}

/* 按鈕 */
button {
  background: #8A5FA2;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* popup */
.popup {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  display: none;
}

</style>
</head>

<body>

<header>MessyTT&L2i</header>

<section class="products">
  <div class="product">
    <img src="S__81002508_0.jpg,S__81002509_0.jpg">
    <p>商品名稱</p>
    <button onclick="showPopup()">加入購物</button>
  </div>
</section>

<div class="popup" id="popup">
  <h3>加入會員</h3>
  <input type="email" placeholder="輸入Email"><br><br>
  <button onclick="submitForm()">送出</button>
</div>

<script>
function showPopup() {
  document.getElementById("popup").style.display = "block";
}

function submitForm() {
  alert("註冊成功！");
}
</script>

</body>
</html>
<!-- 引入 Swiper (滾動圖片套件) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
  :root {
    --main-bg: #D6DADC; /* Pantone 14-4005 */
    --primary-color: #8A5FA2; /* Pantone 17-3628 */
    --white: #ffffff;
  }

  body {
    background-color: var(--main-bg);
    color: var(--primary-color);
    font-family: 'Noto Sans TC', sans-serif;
    margin: 0;
  }

  /* 導覽列優化 */
  header {
    background: var(--white);
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  /* 商品卡片優化 */
  .product-card {
    background: var(--white);
    border-radius: 0px; /* 參考 nit_alcove 偏向直角或微圓角 */
    overflow: hidden;
    transition: transform 0.3s ease;
    border: 1px solid rgba(138, 95, 162, 0.1);
  }

  .product-card:hover {
    transform: translateY(-5px);
  }

  /* 按鈕一致性 */
  .btn-primary {
    background: var(--primary-color);
    color: var(--white);
    border: none;
    padding: 12px 24px;
    letter-spacing: 1px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.3s;
  }

  .btn-primary:active {
    opacity: 0.8;
  }
</style>
