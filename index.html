<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessyTT&L2i | Official</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Swiper CSS (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #D6DADC; /* Pantone 14-4005 */
            --purple: #8A5FA2; /* Pantone 17-3628 */
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--purple); }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4%; height: 100px; background: rgba(214, 218, 220, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; gap: 25px; flex: 1; font-size: 0.8rem; letter-spacing: 2px; }
        .header-center { flex: 1; display: flex; justify-content: center; }
        .header-center img { height: 70px; cursor: pointer; }
        .header-right { display: flex; gap: 20px; flex: 1; justify-content: flex-end; font-size: 1.1rem; }

        /* Sidebar */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); display: none; z-index: 1100; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: #f4f6f8; transition: 0.4s; z-index: 1101; padding: 40px 30px; }
        .sidebar.active { left: 0; }
        .nav-link { display: block; margin-bottom: 25px; text-decoration: none; color: var(--purple); text-transform: uppercase; font-size: 0.85rem; cursor: pointer; }
        .dropdown { padding-left: 15px; display: none; margin-top: 10px; }
        .dropdown.show { display: block; }

        /* 商品展示區 - 修正重點 */
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 4%; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        
        .product-item { width: 100%; display: flex; flex-direction: column; }

        /* 強制給予 Swiper 容器高度，防止塌陷消失 */
        .swiper { 
            width: 100%; 
            height: 400px; /* 電腦版固定高度 */
            background: #e5e8eb; 
            margin-bottom: 15px;
            overflow: hidden; 
            position: relative;
        }
        .swiper-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        /* 商品資訊 */
        .product-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; }
        .product-desc { font-size: 0.75rem; opacity: 0.7; margin-bottom: 12px; line-height: 1.5; min-height: 3em; }
        .product-price { font-size: 0.9rem; margin-bottom: 15px; font-weight: 500; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px 0; font-size: 0.7rem; cursor: pointer; border: 1px solid var(--purple); text-transform: uppercase; transition: 0.3s; }
        .btn-add { background: none; color: var(--purple); }
        .btn-buy { background: var(--purple); color: var(--white); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--purple); color: white; padding: 10px 20px; font-size: 0.8rem; opacity: 0; transition: 0.5s; z-index: 2000; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            .swiper { height: 350px; }
            .header-left span { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div onclick="toggleSidebar()" style="cursor:pointer;"><i class="fa-solid fa-bars-staggered"></i> SHOP</div>
        <span style="margin-left:20px; cursor:pointer;" onclick="showToast('INFO Coming Soon')">INFO</span>
    </div>
    <div class="header-center">
        <img src="images/S__80977927-.png" alt="Logo" onclick="location.href='index.html'">
    </div>
    <div class="header-right">
        <i class="fa-solid fa-bag-shopping" onclick="showToast('購物袋為空')"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="text-align: right; cursor: pointer; margin-bottom:30px;" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></div>
    <a href="#" class="nav-link" style="font-weight:600;">HOME</a>
    <div class="nav-link" onclick="document.getElementById('m-drop').classList.toggle('show')">ALL MESSYTT <i class="fa-solid fa-chevron-down" style="font-size:10px"></i></div>
    <div id="m-drop" class="dropdown">
        <a href="#" class="nav-link" style="font-size:0.75rem; opacity:0.7;">Clothing</a>
        <a href="#" class="nav-link" style="font-size:0.75rem; opacity:0.7;">Original</a>
    </div>
    <div class="nav-link" onclick="document.getElementById('l-drop').classList.toggle('show')">ALL L2I <i class="fa-solid fa-chevron-down" style="font-size:10px"></i></div>
    <div id="l-drop" class="dropdown">
        <a href="#" class="nav-link" style="font-size:0.75rem; opacity:0.7;">Necklace</a>
        <a href="#" class="nav-link" style="font-size:0.75rem; opacity:0.7;">Ring</a>
    </div>
</div>

<div class="main-container">
    <div class="product-grid">
        
        <!-- 商品 1 -->
        <div class="product-item">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="images/S__81002508_0.jpg"></div>
                    <div class="swiper-slide"><img src="images/S__81002509_0.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="product-info">
                <div class="product-name">CYBER BUTTERFLY : NECKLACE</div>
                <div class="product-desc">限量手工蝴蝶項鍊。融合流動金屬質感，展現獨特的未來主義。</div>
                <div class="product-price">NT$ 2,580</div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="showToast('已加入購物車')">Add</button>
                    <button class="btn btn-buy" onclick="showToast('即將前往結帳')">Buy</button>
                </div>
            </div>
        </div>

        <!-- 商品 2 -->
        <div class="product-item">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="images/S__81002510_0.jpg"></div>
                    <div class="swiper-slide"><img src="images/S__81002511_0.jpg"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="product-info">
                <div class="product-name">MESSYTT : MESH BABY-T</div>
                <div class="product-desc">修身透膚網紗材質。不論單穿或層次搭配皆能呈現慵懶美感。</div>
                <div class="product-price">NT$ 1,280</div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="showToast('已加入購物車')">Add</button>
                    <button class="btn btn-buy" onclick="showToast('即將前往結帳')">Buy</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toast">操作成功</div>

<!-- Swiper JS (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // 初始化函數
    function initSwipers() {
        new Swiper('.mySwiper', {
            loop: true,
            observer: true,         // 重點：開啟監聽機制
            observeParents: true,   // 重點：父元素變動也重新計算
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    }

    // 確保所有資源載入後才執行
    window.addEventListener('load', initSwipers);

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.getElementById('overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }
</script>

</body>
</html>
